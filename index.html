<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<title>Animals vs Zombies</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
#game-container {
  position: relative;
  width: 960px;
  height: 540px;
}
canvas#game {
  border: 2px solid #333;
  image-rendering: pixelated;
}
canvas#game3d, canvas#hud3d {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 960px;
  height: 540px;
  border: 2px solid #333;
}
canvas#hud3d {
  pointer-events: none;
}
</style>
</head>
<body>
<!-- Three-canvas setup:
     #game   — 2D Classic mode (Canvas 2D). Visible on title screen and during 2D gameplay.
     #game3d — 3D Survivor mode (Three.js WebGLRenderer). Hidden by default, shown when 3D mode launches.
     #hud3d  — Transparent HUD overlay for 3D mode (Canvas 2D, pointer-events:none). Stacked on top of #game3d. -->
<div id="game-container">
  <canvas id="game" width="960" height="540"></canvas>
  <canvas id="game3d" width="960" height="540"></canvas>
  <canvas id="hud3d" width="960" height="540"></canvas>
</div>
<!-- Three.js r128 — loaded globally as the THREE namespace. Required by game3d.js for 3D rendering. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Entry point: game.js bootstraps the 2D game loop and launches 3D mode via launch3DGame(). -->
<script type="module" src="js/game.js?v=14"></script>
</body>
</html>
