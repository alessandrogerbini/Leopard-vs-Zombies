<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leopard vs Zombies</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  border: 2px solid #333;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ============ GAME STATE ============
const GRAVITY = 0.6;
const GROUND_Y = 440;

const keys = {};
let gameState = 'title'; // title, playing, bossIntro, bossFight, levelComplete, gameWin, gameOver
let currentLevel = 1;
let screenShake = 0;
let screenFlash = 0;
let particles = [];
let floatingTexts = [];
let transitionTimer = 0;

// ============ PLAYER ============
const BASE_PLAYER_W = 48;  // 20% bigger than original 40
const BASE_PLAYER_H = 60;  // 20% bigger than original 50
const DRAW_SCALE = 1.2;    // 20% scale up for rendering

const player = {
  x: 80, y: GROUND_Y, w: BASE_PLAYER_W, h: BASE_PLAYER_H,
  vx: 0, vy: 0,
  speed: 5, jumpForce: -15,
  baseSpeed: 5, baseJumpForce: -15, baseDamage: 15, baseCooldown: 20,
  onGround: false,
  hp: 100, maxHp: 100,
  attacking: false, attackTimer: 0, attackCooldown: 0,
  facing: 1,
  frame: 0, frameTimer: 0,
  invincible: 0,
  combo: 0, comboTimer: 0,
  score: 0,
  knockbackX: 0, // separate knockback velocity
  // Power-up state
  powerups: {
    jumpyBoots: 0,    // timer (frames remaining)
    clawsOfSteel: 0,
    superFangs: 0
  }
};

// ============ CAMERA ============
const camera = { x: 0, y: 0 };

// ============ LEVEL DATA ============
function getLevelData(level) {
  const levels = {
    1: {
      width: 3200,
      name: "THE DARK FOREST",
      bgColor: '#1a2a1a',
      groundColor: '#2d4a2d',
      zombieCount: 12,
      zombieHp: 30,
      zombieSpeed: 1.2,
      platforms: [
        { x: 400, y: 360, w: 120, h: 16 },
        { x: 700, y: 300, w: 100, h: 16 },
        { x: 1000, y: 340, w: 140, h: 16 },
        { x: 1350, y: 280, w: 100, h: 16 },
        { x: 1700, y: 360, w: 120, h: 16 },
        { x: 2000, y: 300, w: 100, h: 16 },
        { x: 2400, y: 340, w: 140, h: 16 },
        { x: 2700, y: 280, w: 100, h: 16 },
      ],
      trees: generateTrees(3200),
    },
    2: {
      width: 4000,
      name: "THE GRAVEYARD",
      bgColor: '#1a1a2a',
      groundColor: '#3a3a4a',
      zombieCount: 18,
      zombieHp: 45,
      zombieSpeed: 1.5,
      platforms: [
        { x: 300, y: 370, w: 100, h: 16 },
        { x: 550, y: 300, w: 80, h: 16 },
        { x: 800, y: 250, w: 100, h: 16 },
        { x: 1100, y: 340, w: 120, h: 16 },
        { x: 1400, y: 280, w: 80, h: 16 },
        { x: 1700, y: 360, w: 100, h: 16 },
        { x: 2000, y: 300, w: 120, h: 16 },
        { x: 2300, y: 250, w: 80, h: 16 },
        { x: 2600, y: 340, w: 100, h: 16 },
        { x: 2900, y: 280, w: 120, h: 16 },
        { x: 3200, y: 360, w: 100, h: 16 },
        { x: 3500, y: 300, w: 80, h: 16 },
      ],
      gravestones: generateGravestones(4000),
    },
    3: {
      width: 5000,
      name: "THE ZOMBIE FORTRESS",
      bgColor: '#2a1a1a',
      groundColor: '#4a2a2a',
      zombieCount: 25,
      zombieHp: 60,
      zombieSpeed: 1.8,
      platforms: [
        { x: 300, y: 360, w: 100, h: 16 },
        { x: 550, y: 290, w: 80, h: 16 },
        { x: 800, y: 220, w: 100, h: 16 },
        { x: 1050, y: 340, w: 120, h: 16 },
        { x: 1350, y: 270, w: 80, h: 16 },
        { x: 1600, y: 360, w: 100, h: 16 },
        { x: 1900, y: 300, w: 120, h: 16 },
        { x: 2200, y: 240, w: 80, h: 16 },
        { x: 2500, y: 340, w: 100, h: 16 },
        { x: 2800, y: 280, w: 120, h: 16 },
        { x: 3100, y: 360, w: 100, h: 16 },
        { x: 3400, y: 300, w: 80, h: 16 },
        { x: 3700, y: 250, w: 100, h: 16 },
        { x: 4000, y: 340, w: 120, h: 16 },
        { x: 4400, y: 300, w: 100, h: 16 },
      ],
      torches: generateTorches(5000),
    }
  };
  return levels[level];
}

function generateTrees(width) {
  const trees = [];
  for (let x = 200; x < width - 200; x += 150 + Math.random() * 200) {
    trees.push({ x, h: 80 + Math.random() * 60 });
  }
  return trees;
}

function generateGravestones(width) {
  const stones = [];
  for (let x = 200; x < width - 200; x += 100 + Math.random() * 150) {
    stones.push({ x, h: 20 + Math.random() * 20 });
  }
  return stones;
}

function generateTorches(width) {
  const torches = [];
  for (let x = 200; x < width - 200; x += 200 + Math.random() * 200) {
    torches.push({ x, flicker: Math.random() * Math.PI * 2 });
  }
  return torches;
}

// ============ ZOMBIES, ITEMS, BOSS, POWERUP CRATES ============
let zombies = [];
let healthPickups = [];
let powerupCrates = [];
let levelData = null;
let diamond = null;
let boss = null;
let bossIntroTimer = 0;

const POWERUP_TYPES = [
  { id: 'jumpyBoots', name: 'JUMPY BOOTS', color: '#44ff88', desc: '+50% Jump Height', icon: 'boot' },
  { id: 'clawsOfSteel', name: 'CLAWS OF STEEL', color: '#ff8844', desc: '2x Attack Damage', icon: 'claw' },
  { id: 'superFangs', name: 'SUPER FANGS', color: '#ff44ff', desc: '2x Attack Speed', icon: 'fang' },
];
const POWERUP_DURATION = 600; // 10 seconds at 60fps

function spawnZombies() {
  zombies = [];
  const ld = levelData;
  for (let i = 0; i < ld.zombieCount; i++) {
    const x = 300 + (i / ld.zombieCount) * (ld.width - 600);
    zombies.push({
      x, y: GROUND_Y, w: 36, h: 48,
      vx: 0, vy: 0,
      hp: ld.zombieHp, maxHp: ld.zombieHp,
      speed: ld.zombieSpeed * (0.8 + Math.random() * 0.4),
      onGround: false,
      facing: -1,
      frame: 0, frameTimer: 0,
      attackTimer: 0,
      hurt: 0,
      type: Math.random() < 0.3 ? 'big' : 'normal',
      alive: true
    });
  }
  zombies.forEach(z => {
    if (z.type === 'big') {
      z.w = 44; z.h = 56;
      z.hp *= 1.8; z.maxHp = z.hp;
      z.speed *= 0.7;
    }
  });
}

function spawnHealthPickups() {
  // Place health pickups ON platforms only
  healthPickups = [];
  const ld = levelData;
  const plats = [...ld.platforms];
  // Shuffle platforms to pick random ones
  for (let i = plats.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [plats[i], plats[j]] = [plats[j], plats[i]];
  }
  const count = Math.min(4 + currentLevel, plats.length);
  for (let i = 0; i < count; i++) {
    const p = plats[i];
    healthPickups.push({
      x: p.x + p.w / 2,
      y: p.y - 12, // sitting on top of platform
      collected: false,
      bobTimer: Math.random() * Math.PI * 2
    });
  }
}

function spawnPowerupCrates() {
  // Place crates on the HIGHEST platforms in each level
  powerupCrates = [];
  const ld = levelData;
  // Sort platforms by Y (lowest Y = highest on screen)
  const sorted = [...ld.platforms].sort((a, b) => a.y - b.y);
  // Pick the top 3 highest platforms (or fewer if not enough)
  const highPlats = sorted.slice(0, Math.min(3, sorted.length));

  highPlats.forEach((p, i) => {
    const type = POWERUP_TYPES[i % POWERUP_TYPES.length];
    powerupCrates.push({
      x: p.x + p.w / 2 - 12,
      y: p.y - 28,
      w: 24, h: 24,
      hp: 3, // takes 3 hits to break
      broken: false,
      powerupType: type,
      shakeTimer: 0
    });
  });
}

function spawnBoss() {
  const ld = levelData;
  boss = {
    x: ld.width - 400, y: GROUND_Y - 20,
    w: 70, h: 90,
    vx: 0, vy: 0,
    hp: 300, maxHp: 300,
    speed: 1.0,
    onGround: false,
    facing: -1,
    frame: 0, frameTimer: 0,
    attackTimer: 0,
    hurt: 0,
    alive: true,
    phase: 1, // gets faster at low HP
    slamCooldown: 0,
    chargeTimer: 0,
    isCharging: false,
  };
}

function initLevel(level) {
  currentLevel = level;
  levelData = getLevelData(level);
  player.x = 80;
  player.y = GROUND_Y;
  player.vx = 0;
  player.vy = 0;
  player.knockbackX = 0;
  player.hp = player.maxHp;
  player.attacking = false;
  player.attackTimer = 0;
  player.attackCooldown = 0;
  player.invincible = 0;
  player.facing = 1;
  player.combo = 0;
  player.powerups.jumpyBoots = 0;
  player.powerups.clawsOfSteel = 0;
  player.powerups.superFangs = 0;
  camera.x = 0;
  particles = [];
  floatingTexts = [];
  diamond = null;
  boss = null;
  bossIntroTimer = 0;

  spawnZombies();
  spawnHealthPickups();
  spawnPowerupCrates();
  gameState = 'playing';
}

// ============ INPUT ============
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  e.preventDefault();
});

// ============ PARTICLES ============
function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * spread,
      vy: (Math.random() - 0.8) * spread,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 60 });
}

// ============ COLLISION ============
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function getAttackBox() {
  const reach = 55; // slightly bigger reach for bigger leopard
  if (player.facing === 1) {
    return { x: player.x + player.w, y: player.y - 5, w: reach, h: player.h + 5 };
  } else {
    return { x: player.x - reach, y: player.y - 5, w: reach, h: player.h + 5 };
  }
}

// ============ POWERUP HELPERS ============
function getPlayerDamage() {
  let dmg = player.baseDamage + player.combo * 3;
  if (player.powerups.clawsOfSteel > 0) dmg *= 2;
  return Math.floor(dmg);
}

function getPlayerCooldown() {
  let cd = player.baseCooldown;
  if (player.powerups.superFangs > 0) cd = Math.floor(cd / 2);
  return cd;
}

function getPlayerJumpForce() {
  let jf = player.baseJumpForce;
  if (player.powerups.jumpyBoots > 0) jf *= 1.5;
  return jf;
}

// ============ UPDATE ============
function update() {
  if (gameState === 'title') {
    if (keys['Enter']) {
      initLevel(1);
    }
    return;
  }

  if (gameState === 'levelComplete') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      if (currentLevel < 3) {
        initLevel(currentLevel + 1);
      } else {
        gameState = 'gameWin';
      }
    }
    return;
  }

  if (gameState === 'bossIntro') {
    bossIntroTimer--;
    if (bossIntroTimer <= 0) {
      gameState = 'bossFight';
    }
    return;
  }

  if (gameState === 'gameWin' || gameState === 'gameOver') {
    if (keys['Enter']) {
      gameState = 'title';
      player.score = 0;
    }
    return;
  }

  // --- PLAYING or BOSSFIGHT ---
  const ld = levelData;
  const inBossFight = gameState === 'bossFight';

  // Powerup timers
  if (player.powerups.jumpyBoots > 0) player.powerups.jumpyBoots--;
  if (player.powerups.clawsOfSteel > 0) player.powerups.clawsOfSteel--;
  if (player.powerups.superFangs > 0) player.powerups.superFangs--;

  // Player movement - preserve momentum in air for platforming
  if (player.onGround) {
    // Instant ground control
    player.vx = 0;
    if (keys['ArrowLeft']) { player.vx = -player.speed; player.facing = -1; }
    if (keys['ArrowRight']) { player.vx = player.speed; player.facing = 1; }
  } else {
    // Air control: keep momentum, steer gradually
    let targetVx = 0;
    if (keys['ArrowLeft']) { targetVx = -player.speed; player.facing = -1; }
    if (keys['ArrowRight']) { targetVx = player.speed; player.facing = 1; }
    player.vx += (targetVx - player.vx) * 0.12;
  }
  if (keys['ArrowUp'] && player.onGround) {
    player.vy = getPlayerJumpForce();
    player.onGround = false;
  }

  // Attack
  const cooldown = getPlayerCooldown();
  if (keys['Space'] && player.attackCooldown <= 0 && !player.attacking) {
    player.attacking = true;
    player.attackTimer = 12;
    player.attackCooldown = cooldown;
  }

  if (player.attacking) {
    player.attackTimer--;
    if (player.attackTimer <= 0) player.attacking = false;
  }
  if (player.attackCooldown > 0) player.attackCooldown--;
  if (player.invincible > 0) player.invincible--;
  if (player.comboTimer > 0) {
    player.comboTimer--;
    if (player.comboTimer <= 0) player.combo = 0;
  }

  // Apply knockback decay
  player.knockbackX *= 0.8;
  if (Math.abs(player.knockbackX) < 0.3) player.knockbackX = 0;

  // Physics
  player.vy += GRAVITY;
  player.x += player.vx + player.knockbackX;
  player.y += player.vy;

  // Ground collision
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
  }

  // Platform collision
  player.onGround = player.y >= GROUND_Y;
  ld.platforms.forEach(p => {
    if (player.vy >= 0 &&
        player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + 10) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // Level bounds
  player.x = Math.max(0, Math.min(player.x, ld.width - player.w));

  // Animation
  player.frameTimer++;
  if (Math.abs(player.vx) > 0) {
    if (player.frameTimer > 6) { player.frame = (player.frame + 1) % 4; player.frameTimer = 0; }
  } else {
    if (player.frameTimer > 12) { player.frame = (player.frame + 1) % 2; player.frameTimer = 0; }
  }

  // Attack hits on zombies
  if (player.attacking && player.attackTimer === 10) {
    const atkBox = getAttackBox();
    const dmg = getPlayerDamage();

    zombies.forEach(z => {
      if (!z.alive) return;
      if (rectCollide(atkBox, z)) {
        z.hp -= dmg;
        z.hurt = 8;
        z.vx = player.facing * 6;
        z.vy = -4;
        player.combo++;
        player.comboTimer = 90;

        spawnParticles(z.x + z.w / 2, z.y + z.h / 2, '#ff4444', 8, 6);
        spawnFloatingText(z.x + z.w/2, z.y - 10, `-${dmg}`, '#ff6666');
        screenShake = 5;

        if (z.hp <= 0) {
          z.alive = false;
          player.score += z.type === 'big' ? 200 : 100;
          spawnParticles(z.x + z.w / 2, z.y + z.h / 2, '#44ff44', 15, 10);
          spawnFloatingText(z.x + z.w/2, z.y - 30, z.type === 'big' ? '+200' : '+100', '#ffff44');
        }
      }
    });

    // Attack hits on boss
    if (boss && boss.alive) {
      if (rectCollide(atkBox, boss)) {
        boss.hp -= dmg;
        boss.hurt = 8;
        boss.vx = player.facing * 3;
        player.combo++;
        player.comboTimer = 90;

        spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff4444', 12, 8);
        spawnFloatingText(boss.x + boss.w/2, boss.y - 10, `-${dmg}`, '#ff6666');
        screenShake = 6;

        if (boss.hp <= 0) {
          boss.alive = false;
          player.score += 1000;
          screenShake = 20;
          screenFlash = 15;
          spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff8800', 40, 15);
          spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffff00', 30, 12);
          spawnFloatingText(boss.x + boss.w/2, boss.y - 40, 'BOSS DEFEATED! +1000', '#ffff44');
          // Spawn the diamond now that boss is dead
          diamond = {
            x: levelData.width - 150,
            y: GROUND_Y - 30,
            collected: false,
            glow: 0
          };
          spawnFloatingText(levelData.width - 150, GROUND_Y - 60, 'THE LEOPARD DIAMOND APPEARS!', '#00ffff');
        }
      }
    }

    // Attack hits on powerup crates
    powerupCrates.forEach(c => {
      if (c.broken) return;
      if (rectCollide(atkBox, c)) {
        c.hp--;
        c.shakeTimer = 6;
        spawnParticles(c.x + c.w/2, c.y + c.h/2, '#aa8844', 4, 4);
        if (c.hp <= 0) {
          c.broken = true;
          // Apply the powerup
          const ptype = c.powerupType;
          player.powerups[ptype.id] = POWERUP_DURATION;
          spawnParticles(c.x + c.w/2, c.y + c.h/2, ptype.color, 20, 10);
          spawnFloatingText(c.x + c.w/2, c.y - 20, ptype.name, ptype.color);
          spawnFloatingText(c.x + c.w/2, c.y - 5, ptype.desc, '#ffffff');
          screenFlash = 5;
          player.score += 150;
        }
      }
    });
  }

  // Zombie AI - uses bounding box overlap for attacks (fixes standing still bug)
  zombies.forEach(z => {
    if (!z.alive) return;
    if (z.hurt > 0) { z.hurt--; }

    const dist = player.x - z.x;
    const absDist = Math.abs(dist);

    // Chase player when within range - match player speed to stay in range
    if (absDist < 400) {
      z.facing = dist > 0 ? 1 : -1;
      // Accelerate toward player, allow zombies to overlap slightly
      if (absDist > 10) {
        z.vx += z.facing * z.speed * 0.4;
        if (Math.abs(z.vx) > z.speed * 1.3) z.vx = z.facing * z.speed * 1.3;
      }
    } else {
      z.vx *= 0.9;
    }

    // Zombie attack - wide hitbox to catch running players (zombie arms reach)
    const reach = z.type === 'big' ? 20 : 15;
    const zBox = { x: z.x - reach, y: z.y - 5, w: z.w + reach * 2, h: z.h + 10 };
    const pBox = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectCollide(zBox, pBox)) {
      z.attackTimer += 2; // charge up faster
      if (z.attackTimer > 20) { // quicker windup for more reliable hits
        if (player.invincible <= 0) {
          const dmg = z.type === 'big' ? 19 : 11; // 5% harder
          player.hp -= dmg;
          player.invincible = 30;
          // Use knockback system instead of vx (which gets overwritten)
          player.knockbackX = z.facing * 8;
          player.vy = -4;
          screenShake = 8;
          screenFlash = 5;
          spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff0000', 6, 5);
          spawnFloatingText(player.x + player.w/2, player.y - 10, `-${dmg}`, '#ff0000');
        }
        z.attackTimer = 0;
      }
    } else {
      z.attackTimer = Math.max(0, z.attackTimer - 1);
    }

    // Zombie physics
    z.vy += GRAVITY;
    z.x += z.vx;
    z.y += z.vy;
    z.vx *= 0.88; // less friction so zombies keep up better

    if (z.y >= GROUND_Y) { z.y = GROUND_Y; z.vy = 0; z.onGround = true; }
    z.x = Math.max(0, Math.min(z.x, ld.width - z.w));

    // Animation
    z.frameTimer++;
    if (z.frameTimer > 10) { z.frame = (z.frame + 1) % 4; z.frameTimer = 0; }
  });

  // ===== BOSS AI =====
  if (boss && boss.alive && inBossFight) {
    if (boss.hurt > 0) boss.hurt--;

    const dist = player.x - boss.x;
    const absDist = Math.abs(dist);
    boss.facing = dist > 0 ? 1 : -1;

    // Phase 2 at 50% HP - gets faster and meaner
    if (boss.hp < boss.maxHp * 0.5 && boss.phase === 1) {
      boss.phase = 2;
      boss.speed = 1.8;
      spawnFloatingText(boss.x + boss.w/2, boss.y - 40, 'BOSS ENRAGED!', '#ff0000');
      screenShake = 10;
    }

    // Charge attack
    if (boss.slamCooldown > 0) boss.slamCooldown--;

    if (!boss.isCharging && absDist < 500 && absDist > 150 && boss.slamCooldown <= 0) {
      // Start charge
      boss.isCharging = true;
      boss.chargeTimer = 30;
      boss.slamCooldown = 120 - (boss.phase === 2 ? 40 : 0);
    }

    if (boss.isCharging) {
      boss.chargeTimer--;
      if (boss.chargeTimer > 15) {
        // Wind up - slight back movement
        boss.vx = boss.facing * -1;
      } else if (boss.chargeTimer > 0) {
        // Charge forward
        boss.vx = boss.facing * (boss.phase === 2 ? 8 : 6);
        spawnParticles(boss.x + boss.w/2, boss.y + boss.h, '#888888', 2, 3);
      } else {
        boss.isCharging = false;
      }
    } else {
      // Normal chase
      if (absDist > boss.w * 0.5) {
        boss.vx += boss.facing * boss.speed * 0.2;
        if (Math.abs(boss.vx) > boss.speed) boss.vx = boss.facing * boss.speed;
      }
    }

    // Boss melee attack
    const bossBox = { x: boss.x - 8, y: boss.y, w: boss.w + 16, h: boss.h };
    const pBox = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectCollide(bossBox, pBox)) {
      boss.attackTimer++;
      const atkSpeed = boss.phase === 2 ? 20 : 30;
      if (boss.attackTimer > atkSpeed) {
        if (player.invincible <= 0) {
          const dmg = boss.isCharging ? 32 : 21; // 5% harder
          player.hp -= dmg;
          player.invincible = 40;
          player.knockbackX = boss.facing * 12;
          player.vy = -6;
          screenShake = 12;
          screenFlash = 8;
          spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff0000', 10, 8);
          spawnFloatingText(player.x + player.w/2, player.y - 10, `-${dmg}`, '#ff0000');
        }
        boss.attackTimer = 0;
      }
    } else {
      boss.attackTimer = Math.max(0, boss.attackTimer - 1);
    }

    // Boss physics
    boss.vy += GRAVITY;
    boss.x += boss.vx;
    boss.y += boss.vy;
    boss.vx *= 0.9;

    if (boss.y + boss.h >= GROUND_Y + boss.h) {
      boss.y = GROUND_Y + boss.h - boss.h;
      boss.vy = 0;
      boss.onGround = true;
    }
    // Keep boss near end of level
    boss.x = Math.max(ld.width - 800, Math.min(boss.x, ld.width - boss.w));

    boss.frameTimer++;
    if (boss.frameTimer > 8) { boss.frame = (boss.frame + 1) % 4; boss.frameTimer = 0; }
  }

  // Health pickups
  healthPickups.forEach(h => {
    if (h.collected) return;
    h.bobTimer += 0.05;
    const hbox = { x: h.x - 10, y: h.y - 10 + Math.sin(h.bobTimer) * 5, w: 20, h: 20 };
    const pbox = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectCollide(pbox, hbox)) {
      h.collected = true;
      player.hp = Math.min(player.maxHp, player.hp + 25);
      spawnParticles(h.x, h.y, '#44ff44', 10, 6);
      spawnFloatingText(h.x, h.y - 20, '+25 HP', '#44ff44');
    }
  });

  // Diamond pickup (level 3 - diamond only exists after boss is dead)
  if (diamond && !diamond.collected) {
    diamond.glow += 0.05;
    const dbox = { x: diamond.x - 15, y: diamond.y - 15, w: 30, h: 30 };
    const pbox = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectCollide(pbox, dbox)) {
      diamond.collected = true;
      player.score += 1000;
      screenFlash = 15;
      spawnParticles(diamond.x, diamond.y, '#00ffff', 30, 12);
      spawnParticles(diamond.x, diamond.y, '#ffffff', 20, 8);
      spawnFloatingText(diamond.x, diamond.y - 40, 'LEOPARD DIAMOND!', '#00ffff');
      gameState = 'levelComplete';
      transitionTimer = 120;
    }
  }

  // Check level completion
  if (currentLevel < 3) {
    const allDead = zombies.every(z => !z.alive);
    if (allDead) {
      gameState = 'levelComplete';
      transitionTimer = 90;
      spawnFloatingText(player.x, player.y - 50, 'LEVEL CLEAR!', '#ffff00');
    }
  } else if (gameState === 'playing') {
    // Level 3: kill all regular zombies → boss spawns
    const allDead = zombies.every(z => !z.alive);
    if (allDead && !boss) {
      spawnBoss();
      gameState = 'bossIntro';
      bossIntroTimer = 90;
      screenShake = 15;
    }
  } else if (inBossFight) {
    // Boss dead → diamond available
    if (boss && !boss.alive && diamond && !diamond.collected) {
      diamond.glow += 0.02;
    }
  }

  // Game over
  if (player.hp <= 0) {
    player.hp = 0;
    gameState = 'gameOver';
    screenShake = 15;
  }

  // Camera
  const targetX = player.x - canvas.width / 3;
  camera.x += (targetX - camera.x) * 0.08;
  camera.x = Math.max(0, Math.min(camera.x, ld.width - canvas.width));

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    return p.life > 0;
  });

  // Floating texts
  floatingTexts = floatingTexts.filter(t => {
    t.y -= 1;
    t.life--;
    return t.life > 0;
  });

  // Screen effects
  if (screenShake > 0) screenShake--;
  if (screenFlash > 0) screenFlash--;
}

// ============ DRAW ============
function drawLeopard(x, y) {
  const f = player.facing;
  const bobY = player.onGround ? Math.sin(player.frameTimer * 0.3) * 2 : 0;
  const alpha = player.invincible > 0 ? (player.invincible % 4 < 2 ? 0.4 : 1) : 1;

  ctx.save();
  ctx.globalAlpha = alpha;
  // Scale from the center-bottom of the leopard
  ctx.translate(x + player.w / 2, y + player.h);
  ctx.scale(DRAW_SCALE, DRAW_SCALE);
  ctx.translate(-(player.w / 2), -player.h);

  const px = 0;
  const py = 0;

  // Body
  ctx.fillStyle = '#e8a828';
  ctx.fillRect(px + (f === 1 ? 5 : 10), py + 15 + bobY, 25, 18);

  // Head
  ctx.fillStyle = '#e8a828';
  ctx.fillRect(px + (f === 1 ? 22 : 2), py + 5 + bobY, 16, 16);

  // Ears
  ctx.fillStyle = '#d09020';
  ctx.fillRect(px + (f === 1 ? 24 : 6), py + 2 + bobY, 5, 5);
  ctx.fillRect(px + (f === 1 ? 31 : 12), py + 2 + bobY, 5, 5);

  // Eye
  ctx.fillStyle = '#00ff00';
  ctx.fillRect(px + (f === 1 ? 30 : 8), py + 10 + bobY, 3, 3);

  // Nose
  ctx.fillStyle = '#ff6688';
  ctx.fillRect(px + (f === 1 ? 35 : 3), py + 14 + bobY, 2, 2);

  // Spots
  ctx.fillStyle = '#c08018';
  const spots = [[8, 17], [15, 20], [22, 17], [12, 24], [20, 25]];
  spots.forEach(([sx, sy]) => {
    ctx.fillRect(px + (f === 1 ? sx : 40 - sx - 3), py + sy + bobY, 3, 3);
  });

  // Legs (animated)
  ctx.fillStyle = '#d09020';
  const legOffset = player.onGround ? Math.sin(player.frame * 1.5) * 4 : -3;
  ctx.fillRect(px + (f === 1 ? 22 : 12), py + 32 + bobY, 5, 14 + legOffset);
  ctx.fillRect(px + (f === 1 ? 15 : 18), py + 32 + bobY, 5, 14 - legOffset);
  ctx.fillRect(px + (f === 1 ? 8 : 26), py + 30 + bobY, 5, 16 - legOffset);
  ctx.fillRect(px + (f === 1 ? 2 : 32), py + 30 + bobY, 5, 16 + legOffset);

  // Paws
  ctx.fillStyle = '#f0c040';
  ctx.fillRect(px + (f === 1 ? 22 : 12), py + 45 + bobY + legOffset, 6, 3);
  ctx.fillRect(px + (f === 1 ? 15 : 18), py + 45 + bobY - legOffset, 6, 3);

  // Tail
  ctx.fillStyle = '#d09020';
  const tailWag = Math.sin(Date.now() * 0.005) * 5;
  ctx.fillRect(px + (f === 1 ? 0 : 36), py + 14 + bobY + tailWag, 4, 6);
  ctx.fillRect(px + (f === 1 ? -3 : 39), py + 10 + bobY + tailWag, 4, 6);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(px + (f === 1 ? -4 : 40), py + 8 + bobY + tailWag, 4, 5);

  // Powerup glow effects on leopard
  if (player.powerups.jumpyBoots > 0) {
    ctx.fillStyle = 'rgba(68,255,136,0.3)';
    ctx.fillRect(px + 2, py + 40, 36, 8); // green glow on feet
  }
  if (player.powerups.clawsOfSteel > 0) {
    ctx.fillStyle = 'rgba(255,136,68,0.4)';
    // Claw marks near paws
    ctx.fillRect(px + (f === 1 ? 34 : 1), py + 14 + bobY, 6, 2);
    ctx.fillRect(px + (f === 1 ? 36 : -1), py + 17 + bobY, 6, 2);
    ctx.fillRect(px + (f === 1 ? 34 : 1), py + 20 + bobY, 6, 2);
  }
  if (player.powerups.superFangs > 0) {
    ctx.fillStyle = '#ff44ff';
    ctx.fillRect(px + (f === 1 ? 33 : 5), py + 16 + bobY, 2, 4); // fang
    ctx.fillRect(px + (f === 1 ? 36 : 2), py + 16 + bobY, 2, 4);
  }

  // Attack slash effect
  if (player.attacking) {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = alpha * (player.attackTimer / 12);
    const slashX = px + (f === 1 ? 40 : -15);
    ctx.beginPath();
    ctx.arc(slashX + 15 * f, py + 20, 25, -0.5 * f, 0.8 * f);
    ctx.stroke();
    ctx.strokeStyle = player.powerups.clawsOfSteel > 0 ? '#ff8844' : '#ffff00';
    ctx.lineWidth = player.powerups.clawsOfSteel > 0 ? 3 : 2;
    ctx.beginPath();
    ctx.arc(slashX + 10 * f, py + 25, 20, -0.3 * f, 0.6 * f);
    ctx.stroke();
  }

  ctx.restore();
}

function drawZombie(z) {
  if (!z.alive) return;
  const px = Math.floor(z.x - camera.x);
  const py = Math.floor(z.y);
  const f = z.facing;
  const hurtFlash = z.hurt > 0 && z.hurt % 2 === 0;
  const isBig = z.type === 'big';
  const s = isBig ? 1.2 : 1;

  ctx.fillStyle = hurtFlash ? '#ffffff' : (isBig ? '#3a5a3a' : '#4a6a4a');
  ctx.fillRect(px + 6 * s, py + 10 * s, 22 * s, 24 * s);

  ctx.fillStyle = hurtFlash ? '#ffffff' : '#5a7a5a';
  ctx.fillRect(px + 8 * s, py, 18 * s, 16 * s);

  ctx.fillStyle = '#ff0000';
  ctx.fillRect(px + (f === 1 ? 18 : 10) * s, py + 5 * s, 3 * s, 3 * s);
  ctx.fillRect(px + (f === 1 ? 22 : 14) * s, py + 5 * s, 3 * s, 3 * s);

  ctx.fillStyle = '#2a3a2a';
  ctx.fillRect(px + 12 * s, py + 11 * s, 10 * s, 3 * s);

  ctx.fillStyle = hurtFlash ? '#ffffff' : '#5a7a5a';
  const armReach = Math.sin(z.frame * 1.2) * 4;
  ctx.fillRect(px + (f === 1 ? 26 : -4) * s, py + 12 * s + armReach, 6 * s, 18 * s);
  ctx.fillRect(px + (f === 1 ? 28 : -6) * s, py + 14 * s - armReach, 6 * s, 18 * s);

  ctx.fillStyle = hurtFlash ? '#ffffff' : '#3a5a3a';
  const legAnim = Math.sin(z.frame * 1.5) * 3;
  ctx.fillRect(px + 10 * s, py + 32 * s, 6 * s, 14 * s + legAnim);
  ctx.fillRect(px + 20 * s, py + 32 * s, 6 * s, 14 * s - legAnim);

  if (z.hp < z.maxHp) {
    const barW = 30 * s;
    const barX = px + (z.w * s - barW) / 2;
    ctx.fillStyle = '#440000';
    ctx.fillRect(barX, py - 8, barW, 4);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(barX, py - 8, barW * (z.hp / z.maxHp), 4);
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const px = Math.floor(boss.x - camera.x);
  const py = Math.floor(boss.y);
  const f = boss.facing;
  const hurtFlash = boss.hurt > 0 && boss.hurt % 2 === 0;
  const isPhase2 = boss.phase === 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px + boss.w/2, py + boss.h + 2, boss.w/2, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body - massive
  const bodyColor = hurtFlash ? '#ffffff' : (isPhase2 ? '#4a2a2a' : '#2a4a2a');
  ctx.fillStyle = bodyColor;
  ctx.fillRect(px + 8, py + 20, 54, 45);

  // Head - huge
  ctx.fillStyle = hurtFlash ? '#ffffff' : (isPhase2 ? '#5a3a3a' : '#3a5a3a');
  ctx.fillRect(px + 10, py - 5, 50, 30);

  // Crown / horns
  ctx.fillStyle = isPhase2 ? '#ff4444' : '#888844';
  ctx.fillRect(px + 15, py - 15, 8, 12);
  ctx.fillRect(px + 47, py - 15, 8, 12);
  ctx.fillRect(px + 30, py - 18, 10, 15);

  // Eyes - large and menacing
  ctx.fillStyle = isPhase2 ? '#ff0000' : '#ff4400';
  const eyeSize = 5 + Math.sin(Date.now() * 0.005) * 1;
  ctx.fillRect(px + (f === 1 ? 38 : 18), py + 3, eyeSize, eyeSize);
  ctx.fillRect(px + (f === 1 ? 48 : 28), py + 3, eyeSize, eyeSize);
  // Eye glow
  ctx.fillStyle = `rgba(255,0,0,${0.3 + Math.sin(Date.now() * 0.01) * 0.2})`;
  ctx.beginPath();
  ctx.arc(px + (f === 1 ? 41 : 21), py + 5, 8, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(px + 20, py + 18, 30, 6);
  // Teeth
  ctx.fillStyle = '#ccccaa';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(px + 22 + i * 6, py + 18, 3, 4);
  }

  // Arms - massive
  ctx.fillStyle = hurtFlash ? '#ffffff' : (isPhase2 ? '#4a2a2a' : '#3a5a3a');
  const armSwing = Math.sin(boss.frame * 1.0) * 6;
  ctx.fillRect(px + (f === 1 ? 56 : -10), py + 22 + armSwing, 14, 35);
  ctx.fillRect(px + (f === 1 ? 60 : -14), py + 26 - armSwing, 14, 35);
  // Claws
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(px + (f === 1 ? 60 : -6), py + 55 + armSwing, 3, 6);
  ctx.fillRect(px + (f === 1 ? 64 : -10), py + 55 + armSwing, 3, 6);
  ctx.fillRect(px + (f === 1 ? 68 : -14), py + 55 + armSwing, 3, 6);

  // Legs
  ctx.fillStyle = hurtFlash ? '#ffffff' : (isPhase2 ? '#3a1a1a' : '#2a3a2a');
  const legAnim = Math.sin(boss.frame * 1.2) * 4;
  ctx.fillRect(px + 15, py + 62, 12, 24 + legAnim);
  ctx.fillRect(px + 43, py + 62, 12, 24 - legAnim);

  // Charge effect
  if (boss.isCharging && boss.chargeTimer <= 15) {
    ctx.strokeStyle = `rgba(255,100,0,${0.5 + Math.sin(Date.now() * 0.02) * 0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px + boss.w/2, py + boss.h/2, boss.w/2 + 10, 0, Math.PI * 2);
    ctx.stroke();
  }

  // HP bar
  const barW = 80;
  const barX = px + (boss.w - barW) / 2;
  ctx.fillStyle = '#440000';
  ctx.fillRect(barX, py - 25, barW, 8);
  ctx.fillStyle = isPhase2 ? '#ff4400' : '#ff0000';
  ctx.fillRect(barX, py - 25, barW * (boss.hp / boss.maxHp), 8);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, py - 25, barW, 8);

  // Boss name
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 10px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('ZOMBIE LORD', px + boss.w/2, py - 30);
  ctx.textAlign = 'left';
}

function drawBackground() {
  const ld = levelData;

  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y + 50);
  if (currentLevel === 1) {
    grad.addColorStop(0, '#0a1a0a');
    grad.addColorStop(1, '#1a3a1a');
  } else if (currentLevel === 2) {
    grad.addColorStop(0, '#0a0a1a');
    grad.addColorStop(1, '#1a1a3a');
  } else {
    grad.addColorStop(0, '#1a0808');
    grad.addColorStop(1, '#3a1a1a');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Moon
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath();
  ctx.arc(700 - camera.x * 0.05, 60, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = currentLevel === 3 ? '#3a1a1a' : '#1a1a2a';
  ctx.beginPath();
  ctx.arc(690 - camera.x * 0.05, 55, 26, 0, Math.PI * 2);
  ctx.fill();

  // Stars
  for (let i = 0; i < 50; i++) {
    const sx = (i * 197 + 50) % canvas.width + Math.sin(Date.now() * 0.001 + i) * 0.5;
    const sy = (i * 73 + 20) % (GROUND_Y - 50);
    const brightness = 0.3 + Math.sin(Date.now() * 0.002 + i * 0.7) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Background decorations
  if (currentLevel === 1 && ld.trees) {
    ld.trees.forEach(t => {
      const tx = t.x - camera.x * 0.6;
      if (tx < -100 || tx > canvas.width + 100) return;
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(tx - 5, GROUND_Y + 50 - t.h, 10, t.h);
      ctx.fillStyle = '#1a4a1a';
      ctx.beginPath();
      ctx.arc(tx, GROUND_Y + 50 - t.h, 25, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a3a0a';
      ctx.beginPath();
      ctx.arc(tx - 8, GROUND_Y + 50 - t.h + 5, 18, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  if (currentLevel === 2 && ld.gravestones) {
    ld.gravestones.forEach(g => {
      const gx = g.x - camera.x * 0.7;
      if (gx < -50 || gx > canvas.width + 50) return;
      ctx.fillStyle = '#5a5a6a';
      ctx.fillRect(gx - 8, GROUND_Y + 50 - g.h, 16, g.h);
      ctx.beginPath();
      ctx.arc(gx, GROUND_Y + 50 - g.h, 8, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#4a4a5a';
      ctx.fillRect(gx - 1, GROUND_Y + 50 - g.h + 4, 2, 10);
      ctx.fillRect(gx - 4, GROUND_Y + 50 - g.h + 7, 8, 2);
    });
  }

  if (currentLevel === 3 && ld.torches) {
    ld.torches.forEach(t => {
      const tx = t.x - camera.x * 0.7;
      if (tx < -50 || tx > canvas.width + 50) return;
      t.flicker += 0.1;
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(tx - 2, GROUND_Y + 50 - 50, 4, 50);
      const flSize = 5 + Math.sin(t.flicker) * 2;
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(tx, GROUND_Y + 50 - 55, flSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(tx, GROUND_Y + 50 - 57, flSize * 0.6, 0, Math.PI * 2);
      ctx.fill();
      const glowGrad = ctx.createRadialGradient(tx, GROUND_Y + 50 - 55, 0, tx, GROUND_Y + 50 - 55, 40);
      glowGrad.addColorStop(0, 'rgba(255,136,0,0.15)');
      glowGrad.addColorStop(1, 'rgba(255,136,0,0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(tx - 40, GROUND_Y + 50 - 95, 80, 80);
    });
  }

  // Ground
  ctx.fillStyle = ld.groundColor;
  ctx.fillRect(0, GROUND_Y + 50, canvas.width, canvas.height - GROUND_Y - 50);

  ctx.fillStyle = ld.groundColor.replace(/[0-9a-f]/g, (c) => {
    const v = Math.min(15, parseInt(c, 16) + 2);
    return v.toString(16);
  });
  ctx.fillRect(0, GROUND_Y + 50, canvas.width, 3);

  // Platforms
  ld.platforms.forEach(p => {
    const px = p.x - camera.x;
    if (px + p.w < 0 || px > canvas.width) return;
    ctx.fillStyle = '#6a5a4a';
    ctx.fillRect(px, p.y, p.w, p.h);
    ctx.fillStyle = '#7a6a5a';
    ctx.fillRect(px, p.y, p.w, 4);
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(px + 5, p.y + p.h, 3, 8);
    ctx.fillRect(px + p.w - 8, p.y + p.h, 3, 8);
  });
}

function drawHUD() {
  // HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(15, 15, 204, 24);
  ctx.fillStyle = '#440000';
  ctx.fillRect(17, 17, 200, 20);
  const hpRatio = player.hp / player.maxHp;
  const hpColor = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillStyle = hpColor;
  ctx.fillRect(17, 17, 200 * hpRatio, 20);
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px "Courier New"';
  ctx.fillText(`HP: ${Math.ceil(player.hp)}/${player.maxHp}`, 22, 32);

  // Score
  ctx.fillStyle = '#ffcc00';
  ctx.font = '16px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${player.score}`, canvas.width - 20, 32);
  ctx.textAlign = 'left';

  // Level indicator
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px "Courier New"';
  ctx.fillText(`LEVEL ${currentLevel} - ${levelData.name}`, 15, 55);

  // Zombie count
  const alive = zombies.filter(z => z.alive).length;
  ctx.fillStyle = '#ff6666';
  if (gameState === 'bossFight') {
    ctx.fillText('BOSS FIGHT!', 15, 75);
  } else {
    ctx.fillText(`ZOMBIES: ${alive}`, 15, 75);
  }

  // Combo
  if (player.combo > 1) {
    ctx.fillStyle = `rgba(255,255,0,${0.5 + Math.sin(Date.now() * 0.01) * 0.5})`;
    ctx.font = '20px "Courier New"';
    ctx.fillText(`COMBO x${player.combo}!`, canvas.width / 2 - 60, 35);
  }

  // Active powerups display
  let puY = 95;
  if (player.powerups.jumpyBoots > 0) {
    const t = player.powerups.jumpyBoots;
    ctx.fillStyle = '#44ff88';
    ctx.font = '11px "Courier New"';
    ctx.fillText(`JUMPY BOOTS [${Math.ceil(t/60)}s]`, 15, puY);
    puY += 14;
  }
  if (player.powerups.clawsOfSteel > 0) {
    const t = player.powerups.clawsOfSteel;
    ctx.fillStyle = '#ff8844';
    ctx.font = '11px "Courier New"';
    ctx.fillText(`CLAWS OF STEEL [${Math.ceil(t/60)}s]`, 15, puY);
    puY += 14;
  }
  if (player.powerups.superFangs > 0) {
    const t = player.powerups.superFangs;
    ctx.fillStyle = '#ff44ff';
    ctx.font = '11px "Courier New"';
    ctx.fillText(`SUPER FANGS [${Math.ceil(t/60)}s]`, 15, puY);
    puY += 14;
  }

  // Level 3 hints
  if (currentLevel === 3) {
    ctx.textAlign = 'center';
    if (gameState === 'playing') {
      const allDead = zombies.every(z => !z.alive);
      if (!allDead) {
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '12px "Courier New"';
        ctx.fillText('Defeat all zombies to face the Zombie Lord!', canvas.width / 2, canvas.height - 20);
      }
    } else if (gameState === 'bossFight' && boss && !boss.alive && diamond && !diamond.collected) {
      ctx.fillStyle = '#00ffff';
      ctx.font = '14px "Courier New"';
      ctx.fillText('>>> THE LEOPARD DIAMOND AWAITS! >>>', canvas.width / 2, canvas.height - 20);
    }
    ctx.textAlign = 'left';
  }
}

function drawDiamond() {
  if (!diamond || diamond.collected) return;

  const dx = diamond.x - camera.x;
  const dy = diamond.y + Math.sin(diamond.glow) * 8;
  const glow = 0.5 + Math.sin(diamond.glow * 3) * 0.3;

  const glowGrad = ctx.createRadialGradient(dx, dy, 0, dx, dy, 50);
  glowGrad.addColorStop(0, `rgba(0,255,255,${glow * 0.4})`);
  glowGrad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(dx - 50, dy - 50, 100, 100);

  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.moveTo(dx, dy - 18);
  ctx.lineTo(dx + 14, dy);
  ctx.lineTo(dx, dy + 18);
  ctx.lineTo(dx - 14, dy);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#88ffff';
  ctx.beginPath();
  ctx.moveTo(dx, dy - 10);
  ctx.lineTo(dx + 7, dy);
  ctx.lineTo(dx, dy + 10);
  ctx.lineTo(dx - 7, dy);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(dx - 1, dy - 22, 2, 6);
  ctx.fillRect(dx - 1, dy + 16, 2, 6);
  ctx.fillRect(dx - 18, dy - 1, 6, 2);
  ctx.fillRect(dx + 12, dy - 1, 6, 2);
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camera.x, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  floatingTexts.forEach(t => {
    const alpha = t.life / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = t.color;
    ctx.font = 'bold 14px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x - camera.x, t.y);
    ctx.textAlign = 'left';
  });
  ctx.globalAlpha = 1;
}

function drawHealthPickups() {
  healthPickups.forEach(h => {
    if (h.collected) return;
    const hx = h.x - camera.x;
    const hy = h.y + Math.sin(h.bobTimer) * 5;

    ctx.fillStyle = '#44ff44';
    ctx.fillRect(hx - 3, hy - 8, 6, 16);
    ctx.fillRect(hx - 8, hy - 3, 16, 6);

    ctx.fillStyle = 'rgba(68,255,68,0.15)';
    ctx.beginPath();
    ctx.arc(hx, hy, 12, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawPowerupCrates() {
  powerupCrates.forEach(c => {
    if (c.broken) return;
    const cx = c.x - camera.x + (c.shakeTimer > 0 ? (Math.random() - 0.5) * 4 : 0);
    const cy = c.y;
    if (c.shakeTimer > 0) c.shakeTimer--;

    // Wooden crate
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(cx, cy, c.w, c.h);
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(cx, cy, c.w, 3);
    ctx.fillRect(cx, cy + c.h - 3, c.w, 3);
    ctx.fillRect(cx, cy, 3, c.h);
    ctx.fillRect(cx + c.w - 3, cy, 3, c.h);
    // Cross plank
    ctx.fillStyle = '#7a5a2a';
    ctx.fillRect(cx + 3, cy + c.h/2 - 1, c.w - 6, 3);
    ctx.fillRect(cx + c.w/2 - 1, cy + 3, 3, c.h - 6);

    // Question mark / powerup icon hint
    ctx.fillStyle = c.powerupType.color;
    ctx.font = 'bold 12px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('?', cx + c.w/2, cy + c.h/2 + 4);
    ctx.textAlign = 'left';

    // Glow
    ctx.fillStyle = `rgba(${c.powerupType.color === '#44ff88' ? '68,255,136' : c.powerupType.color === '#ff8844' ? '255,136,68' : '255,68,255'},${0.1 + Math.sin(Date.now() * 0.003) * 0.05})`;
    ctx.beginPath();
    ctx.arc(cx + c.w/2, cy + c.h/2, 18, 0, Math.PI * 2);
    ctx.fill();

    // HP pips
    for (let i = 0; i < c.hp; i++) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(cx + 4 + i * 7, cy - 6, 5, 3);
    }
  });
}

function drawBossIntro() {
  ctx.fillStyle = `rgba(0,0,0,${0.3 + Math.sin(Date.now() * 0.005) * 0.15})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 36px "Courier New"';
  ctx.textAlign = 'center';

  const shake = Math.sin(Date.now() * 0.02) * 3;
  ctx.fillText('WARNING!', canvas.width / 2 + shake, canvas.height / 2 - 40);

  ctx.fillStyle = '#ffffff';
  ctx.font = '20px "Courier New"';
  ctx.fillText('THE ZOMBIE LORD APPROACHES!', canvas.width / 2, canvas.height / 2 + 10);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '14px "Courier New"';
  ctx.fillText('Defeat the boss to claim the Leopard Diamond', canvas.width / 2, canvas.height / 2 + 50);

  ctx.textAlign = 'left';
}

function drawTitleScreen() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 30; i++) {
    const x = (Date.now() * 0.02 * (i * 0.3 + 0.5) + i * 100) % canvas.width;
    const y = (i * 47 + 10) % canvas.height;
    ctx.fillStyle = `rgba(0,255,0,${0.1 + Math.sin(Date.now() * 0.001 + i) * 0.1})`;
    ctx.fillRect(x, y, 2, 2);
  }

  ctx.fillStyle = '#e8a828';
  ctx.font = 'bold 48px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('LEOPARD', canvas.width / 2, 150);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('vs', canvas.width / 2, 200);
  ctx.fillStyle = '#5a7a5a';
  ctx.fillText('ZOMBIES', canvas.width / 2, 250);

  const dx = canvas.width / 2, dy = 295;
  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.moveTo(dx, dy - 12);
  ctx.lineTo(dx + 10, dy);
  ctx.lineTo(dx, dy + 12);
  ctx.lineTo(dx - 10, dy);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '16px "Courier New"';
  ctx.fillText('Arrow Keys - Move & Jump', canvas.width / 2, 345);
  ctx.fillText('Space - Attack', canvas.width / 2, 370);
  ctx.fillText('Break crates on platforms for power-ups!', canvas.width / 2, 400);
  ctx.fillText('Defeat zombies across 3 levels', canvas.width / 2, 430);
  ctx.fillText('Capture the Leopard Diamond!', canvas.width / 2, 455);

  const blink = Math.sin(Date.now() * 0.005) > 0;
  if (blink) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 20px "Courier New"';
    ctx.fillText('PRESS ENTER TO START', canvas.width / 2, 505);
  }

  ctx.textAlign = 'left';
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 36px "Courier New"';
  ctx.textAlign = 'center';

  if (currentLevel < 3) {
    ctx.fillText(`LEVEL ${currentLevel} COMPLETE!`, canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '18px "Courier New"';
    ctx.fillText(`Advancing to Level ${currentLevel + 1}...`, canvas.width / 2, canvas.height / 2 + 30);
  } else {
    ctx.fillStyle = '#00ffff';
    ctx.fillText('LEOPARD DIAMOND CAPTURED!', canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '18px "Courier New"';
    ctx.fillText('Victory is yours!', canvas.width / 2, canvas.height / 2 + 30);
  }
  ctx.textAlign = 'left';
}

function drawGameWin() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 40; i++) {
    const x = (Date.now() * 0.03 * (i * 0.2 + 0.3) + i * 80) % canvas.width;
    const y = (Date.now() * 0.02 * (i * 0.1 + 0.2) + i * 60) % canvas.height;
    const colors = ['#ff0000', '#ffcc00', '#00ff00', '#00ffff', '#ff00ff'];
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(x, y, 3, 3);
  }

  const dx = canvas.width / 2, dy = 120;
  const glow = Math.sin(Date.now() * 0.003);
  const glowGrad = ctx.createRadialGradient(dx, dy, 0, dx, dy, 60);
  glowGrad.addColorStop(0, 'rgba(0,255,255,0.3)');
  glowGrad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(dx - 60, dy - 60, 120, 120);

  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.moveTo(dx, dy - 25 + glow * 3);
  ctx.lineTo(dx + 20, dy);
  ctx.lineTo(dx, dy + 25 - glow * 3);
  ctx.lineTo(dx - 20, dy);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 42px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', canvas.width / 2, 210);

  ctx.fillStyle = '#ffffff';
  ctx.font = '20px "Courier New"';
  ctx.fillText('The Leopard Diamond is yours!', canvas.width / 2, 260);

  ctx.fillStyle = '#e8a828';
  ctx.font = 'bold 28px "Courier New"';
  ctx.fillText(`FINAL SCORE: ${player.score}`, canvas.width / 2, 320);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '16px "Courier New"';
  ctx.fillText('You fought through the Dark Forest,', canvas.width / 2, 380);
  ctx.fillText('survived the Graveyard, conquered the', canvas.width / 2, 405);
  ctx.fillText('Zombie Fortress, and defeated the Zombie Lord!', canvas.width / 2, 430);

  const blink = Math.sin(Date.now() * 0.005) > 0;
  if (blink) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 18px "Courier New"';
    ctx.fillText('PRESS ENTER TO PLAY AGAIN', canvas.width / 2, 490);
  }
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(80,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 48px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '18px "Courier New"';
  ctx.fillText(`Score: ${player.score}`, canvas.width / 2, canvas.height / 2 + 20);
  ctx.fillText(`Reached Level ${currentLevel}`, canvas.width / 2, canvas.height / 2 + 50);

  const blink = Math.sin(Date.now() * 0.005) > 0;
  if (blink) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 18px "Courier New"';
    ctx.fillText('PRESS ENTER TO RETRY', canvas.width / 2, canvas.height / 2 + 100);
  }
  ctx.textAlign = 'left';
}

// ============ MAIN RENDER ============
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'title') {
    drawTitleScreen();
    return;
  }

  if (gameState === 'gameWin') {
    drawGameWin();
    return;
  }

  // Screen shake
  ctx.save();
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 2,
      (Math.random() - 0.5) * screenShake * 2
    );
  }

  drawBackground();
  drawHealthPickups();
  drawPowerupCrates();
  drawDiamond();

  zombies.forEach(z => drawZombie(z));
  drawBoss();
  drawLeopard(player.x - camera.x, player.y);

  drawParticles();
  drawFloatingTexts();

  ctx.restore();

  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash * 0.06})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  drawHUD();

  if (gameState === 'bossIntro') drawBossIntro();
  if (gameState === 'levelComplete') drawLevelComplete();
  if (gameState === 'gameOver') drawGameOver();
}

// ============ GAME LOOP ============
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
